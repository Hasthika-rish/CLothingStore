<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Anjiana Store</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background: #F8F9FA;">

  <!-- Simple Header for Checkout (no main nav to reduce distraction) -->
  <header style="background: #fff; padding: 20px 0; border-bottom: 1px solid var(--border-color); text-align: center;">
    <a href="index.html" class="logo" style="color: var(--primary-color);">Anjiana Store</a>
  </header>

  <!-- Main Content -->
  <main style="padding-top: 2rem;">
    <section>
      <div class="container" style="max-width: 1200px;">
        
        <h1 style="text-align: center; margin-bottom: 3rem; font-size: 2.5rem;">Secure Checkout</h1>

        <div class="checkout-grid">
          
          <!-- Form Section -->
          <div class="checkout-panel">
            <h3 style="margin-bottom: 2rem;">1. Shipping Information</h3>
            <form id="checkoutForm">
              
              <div class="form-grid-2">
                <div class="form-group">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" class="form-control" required placeholder="John">
                </div>
                <div class="form-group">
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" class="form-control" required placeholder="Doe">
                </div>
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input type="tel" id="phone" class="form-control" required placeholder="+94 77 123 4567">
                </div>
              </div>

              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" class="form-control" required placeholder="123 Fashion Ave">
              </div>

              <div class="form-grid-3">
                <div class="form-group">
                  <label for="city">City</label>
                  <input type="text" id="city" class="form-control" required placeholder="Colombo">
                </div>
                <div class="form-group">
                  <label for="district">District</label>
                  <input type="text" id="district" class="form-control" required placeholder="Colombo">
                </div>
                <div class="form-group">
                  <label for="zip">Postal Code</label>
                  <input type="text" id="zip" class="form-control" required placeholder="00100">
                </div>
              </div>

              <div class="form-group">
                <label for="country">Country</label>
                <select id="country" class="form-control" required>
                  <option value="US">United States</option>
                  <option value="CA">Canada</option>
                  <option value="UK">United Kingdom</option>
                  <option value="AU">Australia</option>
                  <option value="SL">Sri Lanka</option>
                </select>
              </div>

              <h3 style="margin-top: 3rem; margin-bottom: 2rem;">2. Payment Method</h3>
              
              <div class="form-group" style="display: flex; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                  <input type="radio" name="payment" value="card" checked> Credit Card (Stripe)
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-left: 20px;">
                  <input type="radio" name="payment" value="paypal"> PayPal
                </label>
              </div>

              <div class="form-group">
                <label for="card">Card Number (Demo)</label>
                <input type="text" id="card" class="form-control" placeholder="**** **** **** ****">
              </div>

              <div class="form-grid-2">
                <div class="form-group">
                  <label for="exp">Expiry Date</label>
                  <input type="text" id="exp" class="form-control" placeholder="MM/YY">
                </div>
                <div class="form-group">
                  <label for="cvv">CVV</label>
                  <input type="text" id="cvv" class="form-control" placeholder="123">
                </div>
              </div>

              <button type="submit" id="placeOrderBtn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 16px; margin-top: 2rem;">
                Place Order & Pay
              </button>
            </form>
          </div>

          <!-- Order Summary Section -->
          <div>
            <div class="checkout-panel" style="position: sticky; top: 2rem; background: var(--bg-color);">
              <h3 style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">Order Summary</h3>
              
              <div id="orderSummaryContainer">
                <!-- Dynamic order items will be injected here -->
              </div>

              <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 1.5rem;">
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                  <span class="text-muted">Subtotal</span>
                  <span id="checkoutSubtotal">$0.00</span>
                </div>
                <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                  <span class="text-muted">Shipping</span>
                  <span id="checkoutShipping">Free</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); font-size: 1.3rem; font-weight: 700;">
                  <span>Total</span>
                  <span id="checkoutTotal">$0.00</span>
                </div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script type="module" src="js/checkout.js"></script>
</body>
</html>
