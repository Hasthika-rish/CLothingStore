<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product | Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">LUMIÈRE ADMIN</div>
    <nav class="admin-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="dashboard.html">Products</a>
      <a href="add-product.html" class="active">Add New Product</a>
      <a href="#">Orders</a>
      <a href="#">Customers</a>
      <a href="#">Settings</a>
    </nav>
    <div style="margin-top: auto;">
      <a href="../index.html" style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-content">
    
    <header class="admin-header">
      <div>
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Add New Product</h1>
        <p class="text-muted">Create a new product listing in your store.</p>
      </div>
    </header>

    <section>
      <div style="background: #fff; padding: 2.5rem; border-radius: var(--radius-md); box-shadow: 0 4px 20px rgba(0,0,0,0.02); max-width: 800px;">
        
        <form onsubmit="event.preventDefault(); alert('Product Added!'); window.location.href='dashboard.html';">
          
          <div class="form-group">
            <label for="pname">Product Name</label>
            <input type="text" id="pname" class="form-control" required placeholder="e.g. Classic White T-Shirt">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label for="price">Price ($)</label>
              <input type="number" id="price" class="form-control" required placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
              <label for="stock">Stock Quantity</label>
              <input type="number" id="stock" class="form-control" required placeholder="0">
            </div>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="form-control">
              <option>Women • Dresses</option>
              <option>Women • Tops</option>
              <option>Women • Outerwear</option>
              <option>Men • Tops</option>
              <option>Men • Pants</option>
              <option>Accessories</option>
            </select>
          </div>

          <div class="form-group">
            <label>Available Sizes</label>
            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
              <label><input type="checkbox"> XS</label>
              <label><input type="checkbox"> S</label>
              <label><input type="checkbox"> M</label>
              <label><input type="checkbox"> L</label>
              <label><input type="checkbox"> XL</label>
            </div>
          </div>

          <div class="form-group">
            <label for="desc">Description</label>
            <textarea id="desc" class="form-control" rows="4" placeholder="Product details and description..."></textarea>
          </div>

          <div class="form-group">
            <label>Product Image</label>
            <div style="border: 2px dashed var(--border-color); padding: 3rem; text-align: center; border-radius: var(--radius-sm); margin-top: 0.5rem; cursor: pointer; color: var(--text-muted);">
              <p>Drag & drop image here or click to browse</p>
            </div>
          </div>

          <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Product</button>
            <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
          </div>

        </form>

      </div>
    </section>

  </main>

  <script src="../js/app.js"></script>
</body>
</html>
