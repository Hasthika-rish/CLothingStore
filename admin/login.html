<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | LUMIÈRE</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="logo" style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">LUMIÈRE ADMIN</div>
      <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">Sign In</h2>
      <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="admin@lumiere.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
      </form>
      <div style="text-align: center; margin-top: 2rem;">
        <a href="../index.html" style="color: var(--text-muted); font-size: 0.9rem;">← Back to Store</a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
