<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | LUMIÈRE</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">LUMIÈRE</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Shop</a></li>
      </ul>
      <div class="nav-icons">
        <button class="icon-btn theme-toggle" aria-label="Toggle Theme" title="Toggle Theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="icon-btn search-btn" aria-label="Search" title="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <a href="cart.html" class="icon-btn" aria-label="Cart" title="Cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge">2</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <section class="section">
      <div class="container">
        
        <h1 style="text-align: center; margin-bottom: 3rem;">Your Shopping Cart</h1>

        <div class="cart-area">
          <div id="cartItems">
            
            <!-- Cart Item 1 -->
            <div class="cart-item">
              <img src="images/product_dress1.png" alt="Flora Summer Dress" class="cart-item-img">
              <div class="cart-item-info">
                <a href="product-details.html?id=1" class="cart-item-title">Floral Summer Midi Dress</a>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Size: S</p>
                <div class="cart-item-price">$89.00</div>
              </div>
              <div class="qty-controls">
                <button class="qty-btn" aria-label="Decrease quantity">-</button>
                <span>1</span>
                <button class="qty-btn" aria-label="Increase quantity">+</button>
              </div>
              <button class="remove-btn" aria-label="Remove item">X</button>
            </div>

            <!-- Cart Item 2 -->
            <div class="cart-item">
              <img src="images/product_shirt1.png" alt="Casual Linen Shirt" class="cart-item-img">
              <div class="cart-item-info">
                <a href="product-details.html?id=2" class="cart-item-title">Premium Linen Relaxed Shirt</a>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">Size: M</p>
                <div class="cart-item-price">$65.00</div>
              </div>
              <div class="qty-controls">
                <button class="qty-btn" aria-label="Decrease quantity">-</button>
                <span>1</span>
                <button class="qty-btn" aria-label="Increase quantity">+</button>
              </div>
              <button class="remove-btn" aria-label="Remove item">X</button>
            </div>

          </div>

          <div class="cart-summary">
            <h3 style="margin-bottom: 2rem;">Order Summary</h3>
            <div class="summary-row">
              <span class="text-muted">Subtotal (2 items)</span>
              <span>$154.00</span>
            </div>
            <div class="summary-row">
              <span class="text-muted">Estimated Shipping</span>
              <span>Free</span>
            </div>
            <div class="summary-row summary-total">
              <span>Total</span>
              <span>$154.00</span>
            </div>
            <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
               <a href="checkout.html" class="btn btn-primary" style="width: 100%; text-align: center;">Proceed to Checkout</a>
               <a href="products.html" class="btn btn-secondary" style="width: 100%; text-align: center;">Continue Shopping</a>
            </div>
          </div>

        </div>

      </div>
    </section>
  </main>

  <!-- Footer (Mini) -->
  <footer style="padding: 2rem 0;">
    <div class="container text-center">
      <p style="color: rgba(255,255,255,0.7);">&copy; 2026 LUMIÈRE Clothing.</p>
    </div>
  </footer>

  <script src="js/cart.js"></script>
</body>
</html>
