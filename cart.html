  <!-- Main Content -->
  <main>
    <section class="section">
      <div class="container">
        
        <h1 style="text-align: center; margin-bottom: 3rem;">Your Shopping Cart</h1>

        <div class="cart-area">
          <div class="cart-items-container" id="cartItems">
            <!-- Dynamic cart items will be injected here -->
          </div>

          <div class="cart-summary">
            <h3 style="margin-bottom: 2rem;">Order Summary</h3>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
              <span style="color: var(--text-muted);">Subtotal</span>
              <span style="font-weight: 500;" id="cartSubtotal">$0.00</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
              <span style="color: var(--text-muted);">Shipping</span>
              <span style="font-weight: 500;" id="cartShipping">Calculated at checkout</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 1.2rem; font-weight: 700;">
              <span>Total</span>
              <span id="cartTotal">$0.00</span>
            </div>
            <a href="checkout.html" class="btn btn-primary" id="checkoutBtn" style="width: 100%; padding: 16px; text-align: center; display: block;">Proceed to Checkout</a>
            <a href="products.html" class="btn btn-secondary" style="width: 100%; text-align: center; display: block; margin-top: 1rem;">Continue Shopping</a>
          </div>

        </div>

      </div>
    </section>
  </main>
